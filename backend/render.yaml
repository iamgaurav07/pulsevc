services:
  - type: web
    name: pulsevc-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsevc-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false